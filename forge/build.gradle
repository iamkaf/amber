plugins {
    id 'com.iamkaf.multiloader.forge'
}

def minecraftVersion = requiredProp(project, 'project.minecraft')
def libs = catalogFor(project, minecraftVersion)
def useTeaKit = providers.gradleProperty('amber.withTeaKit').orElse('false').map { it.toBoolean() }.get()
def useLegacy1165ForgeRunHack = minecraftVersion == '1.16.5'
def useLegacy1171ForgeRunHack = minecraftVersion == '1.17.1'
def teaKitVersion = versionOrNull(libs, 'teakit')

if (minecraftVersion == '1.16.5') {
