plugins {
    id 'com.iamkaf.multiloader.fabric'
}

def minecraftVersion = requiredProp(project, 'project.minecraft')
def isModernLine = !minecraftVersion.startsWith('1.')
def libs = catalogFor(project, minecraftVersion)

dependencies {
    if (isModernLine) {
        implementation library(libs, 'fabric-api')
    } else {
        if (minecraftVersion != '1.16' && minecraftVersion != '1.16.1') {
            modImplementation library(libs, 'fabric-api')
            modLocalRuntime library(libs, 'fabric-api')
        } else {
            modImplementation 'net.fabricmc.fabric-api:fabric-events-interaction-v0:0.4.1+6a2618f53a'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-events-interaction-v0:0.4.1+6a2618f53a'
            modImplementation 'net.fabricmc.fabric-api:fabric-key-binding-api-v1:1.0.1+730711c63a'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-key-binding-api-v1:1.0.1+730711c63a'
            modImplementation 'net.fabricmc.fabric-api:fabric-loot-tables-v1:1.0.1+6a2618f53a'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-loot-tables-v1:1.0.1+6a2618f53a'
            modImplementation 'net.fabricmc.fabric-api:fabric-rendering-v1:1.5.0+c26373133a'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-rendering-v1:1.5.0+c26373133a'
        }
        compileOnly 'org.jetbrains:annotations:24.1.0'
        if (minecraftVersion == '1.17.1') {
            modImplementation 'net.fabricmc.fabric-api:fabric-loot-tables-v1:1.0.5+cf39a74318'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-loot-tables-v1:1.0.5+cf39a74318'
        }
        if (minecraftVersion == '1.18' || minecraftVersion == '1.18.1') {
            modImplementation 'net.fabricmc.fabric-api:fabric-loot-api-v2:1.1.2+1997ad1260'
            modLocalRuntime 'net.fabricmc.fabric-api:fabric-loot-api-v2:1.1.2+1997ad1260'
        }
    }
}

enableCommonFabricDatagen.call()
